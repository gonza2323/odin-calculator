<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <div class="calculator">
        <div class="display">test</div>
        <div class="keypad">
            <div class="row">
                <button data-key="Escape" class="special" id="ac">AC</button>
                <button data-key="Backspace" class="special" id="ce">CE</button>
                <button data-key="%" class="special" data-op="mod">%</button>
                <button data-key="/" class="operation" data-op="div">÷</button>
            </div>
            <div class="row">
                <button data-key="7" class="number">7</button>
                <button data-key="8" class="number">8</button>
                <button data-key="9" class="number">9</button>
                <button data-key="*" class="operation" data-op="mult">×</button>
            </div>
            <div class="row">
                <button data-key="4" class="number">4</button>
                <button data-key="5" class="number">5</button>
                <button data-key="6" class="number">6</button>
                <button data-key="-" class="operation" data-op="sub">-</button>
            </div>
            <div class="row">
                <button data-key="1" class="number">1</button>
                <button data-key="2" class="number">2</button>
                <button data-key="3" class="number">3</button>
                <button data-key="+" class="operation" data-op="add">+</button>
            </div>
            <div class="row">
                <button data-key="0" class="number" id="zero">0</button>
                <button data-key="." class="number">.</button>
                <button data-key="Enter" class="operation" data-op="equal">=</button>
            </div>
        </div>
    </div>
</body>
</html>
